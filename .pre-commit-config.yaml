# Pre-commit hooks: ruff (format + lint) and mypy.
# Run `pre-commit install` once to enable on commit.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.3
    hooks:
      - id: ruff-format
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        args: ["--config-file", "pyproject.toml"]
        # The hook runs in an isolated env; include the typed test deps so mypy
        # can resolve imports in tests/ just like the local .venv run does.
        additional_dependencies: ["hypothesis==6.122.3", "pytest==8.3.4"]
