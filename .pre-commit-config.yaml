# Pre-commit hooks: ruff (format + lint) and mypy.
# Run `pre-commit install` once to enable on commit.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-format
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: ["--config-file", "pyproject.toml"]
        # The hook runs in an isolated env; include the typed deps so mypy
        # resolves imports just like the local .venv run. Streamlit ships type
        # info (py.typed); without it the UI's st.* returns degrade to Any and
        # mypy flags no-any-return where the local run is clean.
        # fastapi/httpx: the api/ package and its TestClient-based tests are
        # fully typed; without them here the isolated hook env can't resolve
        # the imports the local .venv run resolves fine.
        additional_dependencies:
          [
            "hypothesis==6.156.1",
            "pytest==9.1.1",
            "streamlit==1.58.0",
            "fastapi==0.121.3",
            "httpx==0.28.1",
            # PyJWT ships py.typed, so api/auth.py resolves here. Deliberately
            # WITHOUT the [crypto] extra: that pulls `cryptography`, which has
            # no wheel for this interpreter and tries to build from source,
            # failing on a missing Rust/OpenSSL toolchain. mypy needs the
            # stubs, not the crypto backend — `cryptography.*` is covered by
            # an ignore_missing_imports override in pyproject.toml instead.
            "PyJWT==2.10.1",
          ]
