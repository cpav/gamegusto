<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- GameGusto "Panel" mark (approved 2026-07-20): stick + two buttons on one
       deck. Colors are the dark-mode tokens; when inlined, bind the deck/shaft
       stroke to the ink token, ball to thrill, buttons to charge (see
       design/tokens.css; token names can't appear here verbatim because XML
       comments forbid double hyphens). -->
  <g fill="none" stroke="#f0efe9" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="8" y="44" width="48" height="10" rx="5"/>
    <path d="M22 44V28"/>
  </g>
  <circle cx="22" cy="19" r="8.5" fill="#ff2e97"/>
  <circle cx="25.5" cy="16" r="2" fill="#ffffff" opacity="0.85"/>
  <circle cx="40" cy="39" r="5" fill="#2de2e6"/>
  <circle cx="50" cy="39" r="5" fill="#2de2e6"/>
</svg>
